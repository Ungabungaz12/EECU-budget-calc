<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <nav>
            <ul>
                <li class="logo"><a href="#"></a>
                </li>
                <div id="textclickables">
                    <li class="home"><a href="#">Home</a>
                    </li>
                    <li class="cal"><a href="#">Calculator</a>
                    </li>
                    <li class="about"><a href="#">About</a>
                    </li>
                </div>
            </ul>
        </nav>
    </header>

    <main>
        <div class="content">
            <section id="contentContainer">
                <section class="stepContainer">
                    <a href="index.html"><button id="stepone" class="active">1</button></a>
                    <a href="housing.html"><button id="steptwo">2</button></a>
                    <a href="transportation.html"><button id="stepthree">3</button></a>
                    <a href="index.html"><button id="stepfour">4</button></a>
                    <a href="index.html"><button id="stepfive">5</button></a>
                    <a href="index.html"><button id="stepsix">6</button></a>
                    <a href="index.html"><button id="stepseven">7</button></a>
                </section>

                <section id="interactables">
                    <section id="chartContainer">
                        <canvas id="piechart"></canvas>
                        <h3>Net income $</h3>
                    </section>
    
                    <section id="forms">
                        <form id="expensesform" class="active" action="">
                            <h2>income</h2>
                            <input type="text">
        
                            <button id="addinput">+ add input</button>
                        </form>
    
                        <!-- Idea is to hide forms not active in css; use a class-->
                        <form action="" class="active">
                            <h2>Housing</h2>
                            <!--Add to other forms pls-->
                            <div class="inputs">
                                <input type="text" placeholder="Mortage">
                                <input type="text" placeholder="Insurance">
                                <input type="text" placeholder="Rent">
                                <input type="text" placeholder="Utilities">
                                <input type="text" placeholder="Maintenance">
                                <input type="text" placeholder="Phone">
                            </div>
        
                            <button id="addinput">+ add input</button>
                        </form>
    
                        <form action="" class="inactive">
                            <h2>Eductaion</h2>
                            <input type="text" placeholder="Tuition">
                            <input type="text" placeholder="Stundent Loans">
        
                            <button id="addinput">+ add input</button>
                        </form>
    
                        <form action="" class="inactive">
                            <h2>Transportation</h2>
                            <input type="text" placeholder="Car Payment">
                            <input type="text" placeholder="Insurance">
                            <input type="text" placeholder="Fuel">
                            <input type="text" placeholder="Repairs">
        
                            <button id="addinput">+ add input</button>
                        </form>
                    </section>

                    <!-- Either one button to cycle through steps variable in JS
                    or seperate buttons for each form to go to the next -->
                    <button id="nextForm">Next</button>
                </section>
            </section>
        </div>
    </main>
</body>

</html>
